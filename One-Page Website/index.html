<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wael Khlaif - Portfolio</title>
    <style>
        :root { --primary-color: #457b9d; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        nav { background-color: var(--primary-color); padding: 15px; position: sticky; top: 0; text-align: center; z-index: 100; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        
        section { padding: 60px 20px; max-width: 800px; margin: auto; }
        #home, #video { background-color: white; }
        #pictures, #contact { background-color: var(--bg-color); }
        
        /* Gallery Styles */
        .gallery-img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin: 10px 0; 
            cursor: pointer; 
            transition: transform 0.3s ease;
        }
        .gallery-img:hover { transform: scale(1.02); }

        /* Lightbox Modal Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 3px solid white;
            border-radius: 4px;
        }
        #lightbox .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* NEW: Slideshow Buttons */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -50px;
            color: white;
            font-weight: bold;
            font-size: 40px;
            transition: 0.6s ease;
            user-select: none;
            text-decoration: none;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .prev:hover, .next:hover { background-color: rgba(255, 255, 255, 0.2); border-radius: 5px; }

        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        
        footer { background-color: var(--primary-color); color: white; text-align: center; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Lightbox Overlay -->
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        
        <!-- Navigation Buttons -->
        <a class="prev" onclick="changeImage(-1)">&#10094;</a>
        <img id="lightbox-img" src="" alt="Enlarged view">
        <a class="next" onclick="changeImage(1)">&#10095;</a>
    </div>

    <section id="home">
        <h1>Welcome to Wael Khlaif's Page</h1>
        <p>Hi, I am Wael. This page demonstrates my ability to structure HTML documents using sections, forms, and embedded media.</p>
    </section>

    <section id="pictures">
        <h2>Picture Gallery</h2>
        <!-- Using classes for all images -->
        <img src="https://picsum.photos/id/1025/800/400" alt="A pug wrapped in a blanket" class="gallery-img">
        <img src="https://picsum.photos/id/1012/800/400" alt="A dog in the mountains" class="gallery-img">
        <img src="https://picsum.photos/id/1062/800/400" alt="A dog on the grass" class="gallery-img">
    </section>

    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/tgbNymZ7vqY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </section>

    <section id="contact">
        <h2>Contact Wael</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Wael Khlaif. All rights reserved.</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = document.querySelectorAll('.gallery-img');
        let currentIndex = 0;

        // Initialize gallery: Add click event and index to each image
        images.forEach((image, index) => {
            image.onclick = () => {
                currentIndex = index; // Keep track of which image was clicked
                openLightbox(image.src);
            };
        });

        function openLightbox(src) {
            lightbox.style.display = 'flex';
            lightboxImg.src = src;
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        // Logic to move to Next or Previous image
        function changeImage(direction) {
            currentIndex += direction;

            // Loop back to the beginning or end
            if (currentIndex >= images.length) {
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = images.length - 1;
            }

            lightboxImg.src = images[currentIndex].src;
        }

        // Close lightbox if user clicks background (but not on image or buttons)
        lightbox.onclick = (e) => {
            if (e.target === lightbox || e.target.className === 'close') {
                closeLightbox();
            }
        };

        // Keyboard support for better UX
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === "ArrowLeft") changeImage(-1);
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "Escape") closeLightbox();
            }
        });
    </script>
</body>
</html>
